name: "Brunata Fetcher"
description: "Scrapes the Brunata Nutzerportal and publishes energy sensor data via MQTT Discovery."
version: "0.1.4"
slug: "brunata_fetcher"
url: "https://github.com/MtheK/brunata-fetcher-ha-addon"
init: false
arch:
  - amd64
  - aarch64

options:
  email: ""
  password: ""
  energy_types:
    Heizung: true
    Kaltwasser: true
    Warmwasser: true
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  scan_interval_hours: 24

schema:
  email: email
  password: password
  energy_types:
    Heizung: bool
    Kaltwasser: bool
    Warmwasser: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_user: "str?"
  mqtt_password: "password?"
  scan_interval_hours: "int(1,168)"
